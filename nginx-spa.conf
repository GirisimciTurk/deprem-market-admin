# Admin SPA'yı servis eder. Tüm yollar index.html'e düşer (client-side routing).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Hash'li statik varlıklar uzun süre cache'lenir (Vite içerik-hash kullanır).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: bilinmeyen yollar index.html'e (React Router devralır).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
